<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · CarePhrase Communication Academy</title>
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f8fafc;
        color: #0f172a;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        text-align: center;
        padding: 24px;
      }
      .card { max-width: 360px; }
      img { width: 64px; height: auto; margin-bottom: 16px; }
      h1 { font-size: 1.25rem; margin: 0 0 8px; }
      p { color: #475569; line-height: 1.5; margin: 0 0 20px; }
      a {
        display: inline-block;
        background: #1d5cf5;
        color: #fff;
        text-decoration: none;
        padding: 10px 20px;
        border-radius: 9999px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/logo-mark.png" alt="CarePhrase Communication Academy" />
      <h1>You're offline</h1>
      <p>
        CarePhrase Communication Academy needs an internet connection to record
        and assess your responses. Please reconnect and try again.
      </p>
      <a href="/dashboard">Try again</a>
    </div>
  </body>
</html>
